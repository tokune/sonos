<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonos Manager</title>
  <meta name="description" content="管理局域网 Sonos 音箱的 Web 应用">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div id="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="mobileMenuBtn" class="icon-btn mobile-menu-btn" title="菜单">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" fill="currentColor" />
            <path d="M12 5a7 7 0 0 1 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 1a11 11 0 0 1 11 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 5a7 7 0 0 0-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 1a11 11 0 0 0-11 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span>Sonos Manager</span>
        </div>
      </div>
      <div class="topbar-center">
        <div class="device-selector">
          <select id="deviceSelect">
            <option value="">搜索设备中...</option>
          </select>
          <button id="refreshDevices" class="icon-btn" title="刷新设备">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
            </svg>
          </button>
        </div>
      </div>
      <div class="topbar-right">
        <button id="settingsBtn" class="icon-btn" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Sidebar Backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Main Content -->
    <div class="main-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
          <button class="nav-item active" data-view="files">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
              <path
                d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
            </svg>
            <span>音乐文件</span>
          </button>
          <button class="nav-item" data-view="allMusic">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13" />
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="16" r="3" />
            </svg>
            <span>全部音乐</span>
          </button>
          <button class="nav-item" data-view="playlists">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15V6M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z" />
              <line x1="2" y1="4" x2="14" y2="4" />
              <line x1="2" y1="9" x2="14" y2="9" />
              <line x1="2" y1="14" x2="10" y2="14" />
            </svg>
            <span>播放列表</span>
          </button>
          <button class="nav-item" data-view="url">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            <span>播放URL</span>
          </button>
          <button class="nav-item" data-view="queue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            <span>当前队列</span>
          </button>
        </nav>

        <!-- Playlist list in sidebar -->
        <div class="sidebar-playlists" id="sidebarPlaylists" style="display:none;">
          <div class="sidebar-section-title">
            <span>我的播放列表</span>
            <button id="createPlaylistBtn" class="icon-btn small" title="新建播放列表">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
          <div id="playlistList" class="playlist-list"></div>
        </div>
      </aside>

      <!-- Content Area -->
      <main class="content">
        <!-- Files View -->
        <section id="filesView" class="view active">
          <div class="view-header">
            <h2>音乐文件</h2>
            <div class="view-actions">
              <div class="breadcrumb" id="breadcrumb"></div>
            </div>
          </div>
          <div id="fileList" class="file-list">
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                opacity="0.4">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
              </svg>
              <p>暂无音乐文件</p>
              <p class="hint">在设置中配置音乐目录</p>
            </div>
          </div>
        </section>

        <!-- All Music View -->
        <section id="allMusicView" class="view">
          <div class="view-header">
            <h2>全部音乐</h2>
            <div class="view-actions">
              <span class="all-music-count" id="allMusicCount"></span>
              <button id="playAllMusicBtn" class="btn sm primary" title="播放全部">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                播放全部
              </button>
              <button id="shuffleAllMusicBtn" class="btn sm" title="随机播放全部">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="16 3 21 3 21 8" />
                  <line x1="4" y1="20" x2="21" y2="3" />
                  <polyline points="21 16 21 21 16 21" />
                  <line x1="15" y1="15" x2="21" y2="21" />
                  <line x1="4" y1="4" x2="9" y2="9" />
                </svg>
                随机播放
              </button>
            </div>
          </div>
          <div id="allMusicList" class="file-list"></div>
        </section>

        <!-- Playlists View -->
        <section id="playlistsView" class="view">
          <div class="view-header">
            <h2 id="playlistViewTitle">播放列表</h2>
            <div class="view-actions">
              <button id="createPlaylistBtn2" class="btn primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                新建播放列表
              </button>
            </div>
          </div>
          <div id="playlistContent" class="playlist-content"></div>
        </section>

        <!-- URL View -->
        <section id="urlView" class="view">
          <div class="view-header">
            <h2>播放 URL</h2>
          </div>
          <div class="url-play-container">
            <div class="url-input-wrapper">
              <div class="url-type-badge" id="urlTypeBadge">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="2" y1="12" x2="22" y2="12" />
                  <path
                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
              </div>
              <input type="text" id="urlInput" class="input url-input" placeholder="输入音频链接或 YouTube 地址..."
                autocomplete="off">
              <button id="playUrlBtn" class="btn primary url-play-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                播放
              </button>
            </div>
            <p class="url-hint">支持 YouTube、Bilibili、YouTube Music 链接和直接音频文件地址 (.mp3, .flac, .m4a 等)</p>
            <div class="url-status" id="urlStatus" style="display:none;"></div>
          </div>
          <div class="url-history-section">
            <div class="url-history-header">
              <h3>播放历史</h3>
              <button id="clearUrlHistory" class="btn sm danger">清空</button>
            </div>
            <div id="urlHistory" class="url-history-list"></div>
          </div>
        </section>

        <!-- Queue View -->
        <section id="queueView" class="view">
          <div class="view-header">
            <h2>当前队列</h2>
            <div class="view-actions">
              <button id="prevQueueBtn" class="btn sm" title="上一首">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="19 20 9 12 19 4 19 20" />
                  <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" />
                </svg>
                上一首
              </button>
              <button id="nextQueueBtn" class="btn sm" title="下一首">
                下一首
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5 4 15 12 5 20 5 4" />
                  <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" />
                </svg>
              </button>
              <button id="shuffleQueueBtn" class="btn sm" title="随机播放">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="16 3 21 3 21 8" />
                  <line x1="4" y1="20" x2="21" y2="3" />
                  <polyline points="21 16 21 21 16 21" />
                  <line x1="15" y1="15" x2="21" y2="21" />
                  <line x1="4" y1="4" x2="9" y2="9" />
                </svg>
                随机播放
              </button>
              <button id="refreshQueueBtn" class="btn sm" title="刷新队列">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
                </svg>
                刷新
              </button>
              <button id="clearQueueBtn" class="btn sm danger">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6l-2 14H7L5 6" />
                  <path d="M10 11v6M14 11v6M9 6V4h6v2" />
                </svg>
                清空
              </button>
            </div>
          </div>
          <div id="queueContent" class="queue-list"></div>
        </section>
      </main>
    </div>

    <!-- Player Bar -->
    <footer class="player-bar" id="playerBar">
      <div class="player-track">
        <div class="track-art" id="trackArt">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            opacity="0.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <div class="track-info">
          <div class="track-title" id="trackTitle">未在播放</div>
          <div class="track-artist" id="trackArtist">选择设备开始</div>
        </div>
      </div>

      <div class="player-controls">
        <div class="control-buttons">
          <button id="prevBtn" class="control-btn" title="上一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19 20 9 12 19 4 19 20" />
              <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" />
            </svg>
          </button>
          <button id="playPauseBtn" class="control-btn play-btn" title="播放/暂停">
            <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
          </button>
          <button id="nextBtn" class="control-btn" title="下一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 4 15 12 5 20 5 4" />
              <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" />
            </svg>
          </button>
        </div>
        <div class="progress-container">
          <span class="time-display" id="currentTime">0:00</span>
          <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="1">
          <span class="time-display" id="totalTime">0:00</span>
        </div>
      </div>

      <div class="player-extras">
        <button id="muteBtn" class="control-btn" title="静音">
          <svg class="vol-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
          </svg>
          <svg class="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <line x1="23" y1="9" x2="17" y2="15" />
            <line x1="17" y1="9" x2="23" y2="15" />
          </svg>
        </button>
        <input type="range" id="volumeBar" class="volume-bar" min="0" max="100" value="30" step="1">
        <span class="volume-pct" id="volumePct">30%</span>
      </div>
    </footer>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" style="display:none">
      <div class="modal glass">
        <div class="modal-header">
          <h3>设置</h3>
          <button class="icon-btn close-modal" data-modal="settingsModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>音乐文件目录</label>
            <div class="input-row">
              <input type="text" id="musicDirInput" placeholder="/path/to/music" class="input">
              <button id="saveMusicDir" class="btn primary">保存</button>
            </div>
            <p class="form-hint">设置本地音乐文件所在的目录路径</p>
          </div>
          <div class="form-group">
            <label>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="vertical-align: -2px; margin-right: 4px;">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
              </svg>
              WebDAV 音乐源
            </label>
            <p class="form-hint" style="margin-bottom:8px;">先填写服务器地址和凭据，再点击「浏览」选择音乐目录</p>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              <input type="text" id="webdavServerInput" placeholder="https://your-server.com/dav" class="input"
                style="flex:2;">
              <input type="text" id="webdavUsernameInput" placeholder="用户名" class="input" style="flex:1;">
              <input type="password" id="webdavPasswordInput" placeholder="密码" class="input" style="flex:1;">
            </div>
            <div class="input-row" style="margin-bottom:8px;">
              <input type="text" id="webdavUrlInput" placeholder="点击「浏览」选择音乐目录..." class="input" readonly
                style="cursor:pointer;background:var(--bg-tertiary);">
              <button id="browseWebdavBtn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                </svg>
                浏览
              </button>
            </div>
            <div style="display:flex;gap:8px;">
              <button id="testWebdavBtn" class="btn">测试连接</button>
              <button id="saveWebdavBtn" class="btn primary">保存 WebDAV</button>
              <button id="clearWebdavBtn" class="btn danger">清除</button>
            </div>
            <div id="webdavStatus" class="form-hint" style="margin-top:6px;"></div>
          </div>
          <div class="form-group">
            <label>服务器信息</label>
            <div class="info-grid">
              <div class="info-item"><span class="info-label">地址</span><span class="info-value" id="serverAddr">-</span>
              </div>
              <div class="info-item"><span class="info-label">设备数</span><span class="info-value"
                  id="deviceCount">0</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Create Playlist Modal -->
    <div class="modal-overlay" id="createPlaylistModal" style="display:none">
      <div class="modal glass">
        <div class="modal-header">
          <h3>新建播放列表</h3>
          <button class="icon-btn close-modal" data-modal="createPlaylistModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>播放列表名称</label>
            <input type="text" id="playlistNameInput" placeholder="输入名称..." class="input">
          </div>
          <div class="modal-footer">
            <button class="btn close-modal" data-modal="createPlaylistModal">取消</button>
            <button id="confirmCreatePlaylist" class="btn primary">创建</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal" style="display:none">
      <div class="modal glass" style="max-width:380px;">
        <div class="modal-header">
          <h3 id="confirmModalTitle">确认操作</h3>
        </div>
        <div class="modal-body">
          <p id="confirmModalMessage" style="font-size:14px;color:var(--text-secondary);margin:0 0 20px;"></p>
          <div class="modal-footer">
            <button id="confirmModalCancel" class="btn">取消</button>
            <button id="confirmModalOk" class="btn danger">确认删除</button>
          </div>
        </div>
      </div>
    </div>
    <!-- WebDAV Browse Modal -->
    <div class="modal-overlay" id="webdavBrowseModal" style="display:none">
      <div class="modal glass" style="max-width:520px;">
        <div class="modal-header">
          <h3>选择 WebDAV 音乐目录</h3>
          <button class="icon-btn close-modal" data-modal="webdavBrowseModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div id="webdavBrowseBreadcrumb" class="breadcrumb" style="margin-bottom:12px;flex-wrap:wrap;"></div>
